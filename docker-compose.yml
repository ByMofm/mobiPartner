services:
  db:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mobipartner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mobipartner_dev}
      POSTGRES_DB: ${POSTGRES_DB:-mobipartner}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mobipartner}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 4G
    profiles:
      - vision

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mobipartner}:${POSTGRES_PASSWORD:-mobipartner_dev}@db:5432/${POSTGRES_DB:-mobipartner}
      REDIS_URL: redis://redis:6379/0
      DEBUG: ${DEBUG:-true}
      OLLAMA_URL: http://ollama:11434
      IMAGE_ANALYSIS_ENABLED: ${IMAGE_ANALYSIS_ENABLED:-false}
      IMAGE_ANALYSIS_MODEL: ${IMAGE_ANALYSIS_MODEL:-llava:13b}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    command: npm run dev

volumes:
  pgdata:
  redisdata:
  ollama_data:
